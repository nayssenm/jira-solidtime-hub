<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Advanced Analytics - Static BI Engine</title>
  <script src="static-analytics/advanced-analytics-engine.js" defer></script>
  <style>
    :root {
      color: #172033;
      background: #f5f7fb;
      font-family: Inter, Arial, sans-serif;
    }
    body {
      margin: 0;
      padding: 24px;
    }
    .shell {
      max-width: 1180px;
      margin: auto;
    }
    .top {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    h1 {
      margin: 0;
      font-size: 24px;
    }
    select,
    button {
      height: 38px;
      border: 1px solid #d7deea;
      border-radius: 8px;
      background: white;
      padding: 0 12px;
    }
    button {
      cursor: pointer;
      color: white;
      background: #1e6fd9;
      font-weight: 700;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }
    .card,
    .panel {
      background: white;
      border: 1px solid #e3e8f2;
      border-radius: 8px;
      box-shadow: 0 12px 30px rgba(20, 32, 58, 0.06);
    }
    .card {
      padding: 14px;
    }
    .label,
    .muted {
      color: #667085;
      font-size: 12px;
    }
    .value {
      margin-top: 6px;
      font-size: 26px;
      font-weight: 800;
    }
    .panels {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 14px;
      margin-top: 14px;
    }
    .panel {
      padding: 16px;
    }
    .row {
      display: grid;
      grid-template-columns: 88px 1fr auto;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #eef2f7;
    }
    .badge {
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 12px;
      font-weight: 700;
    }
    .green {
      color: #087a50;
      background: #e7f8ef;
    }
    .orange {
      color: #9a6200;
      background: #fff3dd;
    }
    .red {
      color: #b42318;
      background: #ffe9e4;
    }
    .insight {
      padding: 10px 0;
      border-bottom: 1px solid #eef2f7;
      line-height: 1.45;
    }
    .bar {
      height: 8px;
      background: #eef2f7;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }
    .bar span {
      display: block;
      height: 100%;
      background: #1e6fd9;
    }
    @media (max-width: 900px) {
      .grid,
      .panels {
        grid-template-columns: 1fr;
      }
      .top {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="top">
      <div>
        <h1>Advanced Analytics & AI Insight Engine</h1>
        <div class="muted">Static Vercel-ready BI report generated from dashboard_dataset.csv</div>
      </div>
      <div>
        <select id="project" aria-label="Filter by project"><option value="">All projects</option></select>
        <button id="download" type="button">Download CSV</button>
        <button id="json" type="button">Download JSON</button>
      </div>
    </div>
    <section class="grid" id="kpis" aria-label="Advanced KPI cards"></section>
    <section class="panels">
      <div class="panel"><h2>Anomaly alerts</h2><div id="anomalies"></div></div>
      <div class="panel"><h2>Insights</h2><div id="insights"></div></div>
    </section>
    <section class="panels">
      <div class="panel"><h2>Recommendations</h2><div id="recommendations"></div></div>
      <div class="panel"><h2>Project Risk Ranking</h2><div id="rankings"></div></div>
    </section>
  </main>
  <script>
    var rawRows = [];
    var latest = null;
    var project = document.getElementById("project");

    function badgeColor(value) {
      return String(value || "green").toLowerCase();
    }

    function escapeHtml(value) {
      return String(value == null ? "" : value).replace(/[&<>"']/g, function (ch) {
        return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[ch];
      });
    }

    function card(label, value, sub, color) {
      return '<article class="card"><div class="label">' + escapeHtml(label) + '</div><div class="value">' + escapeHtml(value) + '</div><div class="muted"><span class="badge ' + badgeColor(color) + '">' + escapeHtml(sub) + '</span></div></article>';
    }

    function render(report) {
      latest = report;
      if (project.options.length === 1) {
        report.projects.slice().sort(function (a, b) { return a.project.localeCompare(b.project); }).forEach(function (item) {
          var option = document.createElement("option");
          option.value = item.project;
          option.textContent = item.project;
          project.appendChild(option);
        });
      }
      var k = report.kpis;
      document.getElementById("kpis").innerHTML = [
        card("Health Score", k.project_health_score, "risk " + k.risk_level, k.risk_color),
        card("Productivity", k.team_productivity_score, "team score", "green"),
        card("Completion Rate", k.task_completion_rate + "%", "tasks done", k.task_completion_rate < 45 ? "red" : "green"),
        card("Avg Time / Task", k.average_time_per_task + "h", k.total_tasks + " tasks", "orange")
      ].join("");
      document.getElementById("anomalies").innerHTML = report.anomalies.slice(0, 14).map(function (a) {
        return '<div class="row"><span class="badge ' + badgeColor(a.risk_color) + '">' + escapeHtml(a.risk_level) + '</span><strong>' + escapeHtml(a.entity_type + ": " + a.entity_id) + '</strong><span>' + escapeHtml(a.score) + '</span><div class="muted" style="grid-column:2/4">' + escapeHtml(a.reason) + '</div></div>';
      }).join("") || '<p class="muted">No anomalies detected.</p>';
      document.getElementById("insights").innerHTML = report.insights.slice(0, 12).map(function (i) {
        var color = i.severity === "High" ? "red" : i.severity === "Medium" ? "orange" : "green";
        return '<div class="insight"><span class="badge ' + color + '">' + escapeHtml(i.severity) + '</span> ' + escapeHtml(i.text) + '</div>';
      }).join("") || '<p class="muted">No insights for this filter.</p>';
      document.getElementById("recommendations").innerHTML = report.recommendations.slice(0, 12).map(function (r) {
        return '<div class="insight"><strong>' + escapeHtml(r.priority + ": " + r.problem) + '</strong><br><span class="muted">' + escapeHtml(r.suggested_action) + '</span></div>';
      }).join("");
      document.getElementById("rankings").innerHTML = report.rankings.worst_projects.slice(0, 8).map(function (p) {
        return '<div class="insight"><strong>' + escapeHtml(p.project) + '</strong><span class="badge ' + badgeColor(p.risk_color) + '" style="float:right">' + escapeHtml(p.risk_level) + '</span><div class="muted">Health ' + escapeHtml(p.health_score) + '/100, ' + escapeHtml(p.total_hours) + 'h</div><div class="bar"><span style="width:' + Math.max(0, Math.min(100, p.health_score)) + '%"></span></div></div>';
      }).join("");
    }

    function refresh() {
      render(window.AdvancedAnalyticsEngine.buildReport(rawRows, { project: project.value || null }));
    }

    function download(name, content, type) {
      var blob = new Blob([content], { type: type });
      var link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = name;
      link.click();
      URL.revokeObjectURL(link.href);
    }

    project.addEventListener("change", refresh);
    document.getElementById("download").addEventListener("click", function () {
      download("advanced_analytics_report.csv", window.AdvancedAnalyticsEngine.toCsv(latest), "text/csv;charset=utf-8");
    });
    document.getElementById("json").addEventListener("click", function () {
      download("advanced_analytics_report.json", JSON.stringify(latest, null, 2), "application/json;charset=utf-8");
    });

    window.addEventListener("DOMContentLoaded", function () {
      fetch("dashboard_dataset.csv")
        .then(function (res) {
          if (!res.ok) throw new Error("CSV not found");
          return res.text();
        })
        .then(function (text) {
          rawRows = window.AdvancedAnalyticsEngine.parseCsv(text);
          refresh();
        })
        .catch(function (err) {
          document.getElementById("kpis").innerHTML = '<article class="card"><strong>Unable to load dashboard_dataset.csv</strong><div class="muted">' + escapeHtml(err.message) + '</div></article>';
        });
    });
  </script>
</body>
</html>
