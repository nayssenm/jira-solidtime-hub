<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Créer un compte — KPI Hub</title>
<link rel="stylesheet" href="auth.css">
</head>
<body>

<div class="video-bg">
  <video autoplay muted loop playsinline
    src="https://videos.pexels.com/video-files/3129671/3129671-uhd_2560_1440_30fps.mp4">
  </video>
</div>
<div class="overlay"></div>
<div class="grid"></div>

<div class="card">

  <a class="logo" href="login.html">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24"><path d="M3 3h8v8H3zm10 0h8v8h-8zM3 13h8v8H3zm10 4h2v-2h2v2h2v2h-2v2h-2v-2h-2z"/></svg>
    </div>
    <span class="logo-text">KPI <em>Hub</em></span>
  </a>

  <h2>Créer un compte</h2>
  <p class="sub">Renseignez vos informations pour commencer</p>

  <!-- Error banner -->
  <div class="global-err" id="globalErr"><span>⛔</span><span id="globalErrText"></span></div>

  <!-- Single-step form -->
  <div id="step1">
    <div class="field">
      <label>Adresse email</label>
      <div class="field-row">
        <input type="email" id="email" placeholder="vous@exemple.com"
               oninput="validateEmail()" autocomplete="email">
      </div>
      <div class="field-msg" id="emailMsg"></div>
    </div>

    <div class="field">
      <label>Mot de passe</label>
      <div class="field-row">
        <input type="password" id="password" placeholder="Minimum 6 caractères"
               oninput="validatePass()" style="padding-right:44px;" autocomplete="new-password">
        <span class="eye" id="eye1" onclick="toggleEye('password','eye1')">👁</span>
      </div>
      <div class="field-msg" id="passMsg"></div>
    </div>

    <div class="field">
      <label>Confirmer le mot de passe</label>
      <div class="field-row">
        <input type="password" id="confirm" placeholder="Répéter le mot de passe"
               oninput="validateConfirm()" style="padding-right:44px;" autocomplete="new-password">
        <span class="eye" id="eye2" onclick="toggleEye('confirm','eye2')">👁</span>
      </div>
      <div class="field-msg" id="confirmMsg"></div>
    </div>

    <button class="btn" id="btn1" onclick="register()">Créer mon compte →</button>
  </div>

  <!-- Success state -->
  <div id="step4" style="display:none;">
    <div class="success-icon">✓</div>
    <p style="text-align:center;color:rgba(74,222,128,.9);font-size:15px;font-weight:600;margin-bottom:8px;">Compte créé avec succès !</p>
    <p style="text-align:center;font-size:12px;color:rgba(255,255,255,.4);margin-bottom:20px;">Redirection vers la page de connexion…</p>
    <div style="height:3px;border-radius:2px;background:rgba(74,222,128,.15);overflow:hidden;">
      <div id="successBar" style="height:100%;width:0%;background:linear-gradient(90deg,#4ade80,#22c55e);border-radius:2px;transition:width 1.4s linear;"></div>
    </div>
  </div>

  <div class="link" id="loginLink">
    Déjà un compte ? <a href="login.html">Se connecter</a>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Toast ─────────────────────────────────────────────────────────────────
function toast(msg, type = 'ok') {
  const t = document.getElementById('toast');
  t.innerHTML = `<span>${type === 'ok' ? '✓' : '⚠'}</span> ${msg}`;
  t.style.borderColor = type === 'ok' ? 'rgba(74,222,128,0.3)' : 'rgba(248,113,113,0.3)';
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 3800);
}

// ── Error helpers ─────────────────────────────────────────────────────────
function showGlobal(msg) {
  document.getElementById('globalErrText').textContent = msg;
  document.getElementById('globalErr').classList.add('show');
}
function hideGlobal() { document.getElementById('globalErr').classList.remove('show'); }

// ── Field helpers ─────────────────────────────────────────────────────────
function setField(id, msgId, state, msg) {
  const inp   = document.getElementById(id);
  const msgEl = document.getElementById(msgId);
  inp.classList.remove('ok', 'err');
  msgEl.classList.remove('show', 'error', 'success');
  if (state) {
    inp.classList.add(state === 'ok' ? 'ok' : 'err');
    msgEl.textContent = msg;
    msgEl.classList.add('show', state === 'ok' ? 'success' : 'error');
  }
}
function toggleEye(inputId, eyeId) {
  const inp = document.getElementById(inputId);
  const eye = document.getElementById(eyeId);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  if (eye) eye.textContent = inp.type === 'password' ? '👁' : '🙈';
}

// ── Validators ────────────────────────────────────────────────────────────
function validateEmail() {
  const val = document.getElementById('email').value.trim();
  if (!val)                                      return setField('email', 'emailMsg', 'err', 'Email requis');
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)) return setField('email', 'emailMsg', 'err', 'Format invalide');
  setField('email', 'emailMsg', 'ok', 'Email valide ✓');
}
function validatePass() {
  const val = document.getElementById('password').value;
  if (val.length < 6) return setField('password', 'passMsg', 'err', 'Minimum 6 caractères');
  setField('password', 'passMsg', 'ok', 'Mot de passe valide ✓');
  if (document.getElementById('confirm').value) validateConfirm();
}
function validateConfirm() {
  const pass = document.getElementById('password').value;
  const conf = document.getElementById('confirm').value;
  if (!conf)          return setField('confirm', 'confirmMsg', 'err', 'Ce champ est requis');
  if (pass !== conf)  return setField('confirm', 'confirmMsg', 'err', 'Les mots de passe ne correspondent pas');
  setField('confirm', 'confirmMsg', 'ok', 'Correspond ✓');
}

// ── Register ──────────────────────────────────────────────────────────────
function register() {
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('password').value;
  const conf  = document.getElementById('confirm').value;
  hideGlobal();

  // Validate all fields before submitting
  validateEmail(); validatePass(); validateConfirm();
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return;
  if (pass.length < 6)  return;
  if (pass !== conf)    return;

  const btn = document.getElementById('btn1');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Création…';

  setTimeout(() => {
    const users = JSON.parse(localStorage.getItem('kpi_users') || '[]');

    if (users.find(u => u.email === email)) {
      showGlobal('Un compte existe déjà avec cet email.');
      btn.disabled = false;
      btn.innerHTML = 'Créer mon compte →';
      return;
    }

    users.push({
      email,
      password:  pass,
      name:      email.split('@')[0],
      createdAt: Date.now(),
      verified:  true,
    });
    localStorage.setItem('kpi_users', JSON.stringify(users));

    // Show success state
    document.getElementById('step1').style.display    = 'none';
    document.getElementById('loginLink').style.display = 'none';
    document.getElementById('step4').style.display     = 'block';
    setTimeout(() => {
      document.getElementById('successBar').style.width = '100%';
    }, 50);

    toast('Compte créé avec succès ! Redirection…');
    setTimeout(() => window.location.href = 'login.html', 1600);
  }, 700);
}

// ── Enter key ─────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') register();
});
</script>
</body>
</html>
